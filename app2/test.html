<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Søgemotor test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui; margin: 1rem; max-width: 900px; }
    h1 { font-size: 1.2rem; }
    .search-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    input, select { padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 0.4rem; }
    input[type="text"] { flex: 1; min-width: 200px; }
    .result { border: 1px solid #ddd; padding: 0.5rem 0.8rem; margin: 0.4rem 0; border-radius: 0.4rem; background: #f9fafb; }
    .result-title { font-weight: 600; }
    .result-meta { color: #555; font-size: 0.85rem; margin-top: 0.2rem; }
    .result-score { float: right; color: #888; font-size: 0.8rem; }
    .matched { color: #2563eb; font-size: 0.8rem; }
    .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.5rem; margin-bottom: 1rem; }
    .filter-group label { font-size: 0.75rem; font-weight: 600; color: #444; display: block; margin-bottom: 0.2rem; }
    .filter-group select { width: 100%; }
    h2 { margin-top: 2rem; font-size: 1rem; border-bottom: 1px solid #ddd; padding-bottom: 0.3rem; }
    .examples { background: #fffbeb; padding: 0.5rem 0.8rem; border-radius: 0.4rem; font-size: 0.85rem; margin-bottom: 1rem; }
    .examples b { color: #92400e; }
  </style>
</head>
<body>
  <h1>Søgemotor test</h1>

  <h2>Mode 1: Søg på artsnavn</h2>
  <div class="search-row">
    <input id="nameQuery" type="text" placeholder="fx: stjerne star, anemone, mangløv..." />
  </div>
  <div id="nameResults"></div>

  <h2>Mode 2: Søg på kendetegn</h2>
  <div class="examples">
    <b>Prøv fx:</b>
    <code>halvgræs tuedannende mose lille</code> /
    <code>gul kurv eng</code> /
    <code>siv tueformet sø</code> /
    <code>trekantet stængel hede</code> /
    <code>surkulent vand</code> (typo for sukkulent)
  </div>
  <div class="search-row">
    <input id="charQuery" type="text" placeholder="Beskriv kendetegn..." />
  </div>
  <div class="filters" id="charFilters"></div>
  <div id="charResults"></div>

  <script type="module">
    import { searchByName, searchByCharacteristics, buildSynonymLookup } from "./js/search.js";

    let DATA = [];
    let VOCAB = {};
    let SYNONYMS = {};
    let SYN_LOOKUP = {};

    async function loadData() {
      const [d, v, s] = await Promise.all([
        fetch("data/botanik_final.json").then(r => r.json()),
        fetch("data/vocabulary.json").then(r => r.json()),
        fetch("data/synonyms.json").then(r => r.json()),
      ]);
      DATA = d;
      VOCAB = v;
      SYNONYMS = s;
      SYN_LOOKUP = buildSynonymLookup(s);
      console.log("Indlæst:", DATA.length, "arter,", Object.keys(VOCAB).length, "vocab-kategorier");
    }

    function renderArt(item, isCharSearch = false) {
      const art = isCharSearch ? item.art : item;
      const tags = art.tags || {};
      const niveauBadge = art.niveau === "slægt" ? "[SLÆGT] " : "";
      const flat = (k, max=4) => {
        const arr = tags[k] || [];
        return arr.length ? `<b>${k}:</b> ${arr.slice(0, max).join(", ")}` : "";
      };
      const parts = [
        flat("plantegruppe"),
        flat("vækstform"),
        flat("højde"),
        flat("blomsterfarve"),
        flat("habitat", 6),
        flat("blomstring"),
      ].filter(Boolean);

      const score = isCharSearch ? `<span class="result-score">score: ${item.score.toFixed(2)}</span>` : "";
      const matched = isCharSearch && item.matchedTokens?.length
        ? `<div class="matched">matchede: ${item.matchedTokens.join(", ")}</div>` : "";

      return `<div class="result">
        ${score}
        <div class="result-title">${niveauBadge}${art.Title}</div>
        <div class="result-meta">
          ${art.familie ? `<i>${art.familie}</i>` : ""}
          ${art.slægt ? ` | slægt: <i>${art.slægt}</i>` : ""}
          <br>${parts.slice(0, 4).join(" — ")}
        </div>
        ${matched}
      </div>`;
    }

    function buildFilters() {
      const container = document.getElementById("charFilters");
      const fields = [
        { key: "niveau", label: "Niveau", options: ["art", "slægt"] },
        { key: "familie", label: "Familie", options: VOCAB.familie?.map(x => x.value) || [] },
        { key: "plantegruppe", label: "Plantegruppe", options: VOCAB.plantegruppe?.map(x => x.value) || [] },
        { key: "habitat", label: "Habitat", options: VOCAB.habitat?.map(x => x.value) || [] },
      ];
      container.innerHTML = fields.map(f => `
        <div class="filter-group">
          <label>${f.label}</label>
          <select id="filter-${f.key}">
            <option value="">— alle —</option>
            ${f.options.map(o => `<option value="${o}">${o}</option>`).join("")}
          </select>
        </div>
      `).join("");

      for (const f of fields) {
        document.getElementById(`filter-${f.key}`).addEventListener("change", runCharSearch);
      }
    }

    function runNameSearch() {
      const q = document.getElementById("nameQuery").value;
      const results = searchByName(q, DATA, 10);
      document.getElementById("nameResults").innerHTML =
        results.length ? results.map(r => renderArt(r, false)).join("") : "<i>Ingen match</i>";
    }

    function runCharSearch() {
      const q = document.getElementById("charQuery").value;
      const filters = {
        niveau: document.getElementById("filter-niveau")?.value || null,
        familie: document.getElementById("filter-familie")?.value
          ? [document.getElementById("filter-familie").value] : [],
        plantegruppe: document.getElementById("filter-plantegruppe")?.value
          ? [document.getElementById("filter-plantegruppe").value] : [],
        habitat: document.getElementById("filter-habitat")?.value
          ? [document.getElementById("filter-habitat").value] : [],
      };
      const results = searchByCharacteristics(q, filters, DATA, SYN_LOOKUP, 10);
      document.getElementById("charResults").innerHTML =
        results.length ? results.map(r => renderArt(r, true)).join("") : "<i>Ingen match</i>";
    }

    (async () => {
      await loadData();
      buildFilters();

      document.getElementById("nameQuery").addEventListener("input", runNameSearch);
      document.getElementById("charQuery").addEventListener("input", runCharSearch);

      // Vis startresultater
      runNameSearch();
      runCharSearch();
    })();
  </script>
</body>
</html>
