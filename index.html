<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Botanik Flashcards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-row">
        <h1>Botanik</h1>

        <!-- Flyttet fra card-header -->
        <div class="header-status">
          <span class="card-label" id="field-label"></span>
          <span class="family-badge" id="familyBadge"></span>
        </div>

        <div class="header-actions">
          <button id="filterToggleBtn" class="btn-ghost small header-filter" type="button" aria-haspopup="true" aria-expanded="false">
            Filter
          </button>

          <!-- Filter dropdown (ankret under knappen) -->
          <div id="filterPanel" class="filter-panel hidden" role="dialog" aria-label="Filtre">
            <div class="filter-panel-inner">
              <div class="filters">
                <div class="filter-group">
                  <label for="habitattypeFilter">Habitattype</label>
                  <select id="habitattypeFilter">
                    <option value="">Alle</option>
                  </select>
                </div>

                <div class="filter-group">
                  <label for="familieFilter">Familie</label>
                  <select id="familieFilter">
                    <option value="">Alle</option>
                  </select>
                </div>

                <button id="clearFiltersBtn" class="btn-ghost small" type="button">Nulstil</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div id="card" class="card">
        <div class="card-content" id="field-content">
          <p>Swipe op (eller klik på kortet) for at starte.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Svar-overlay -->
  <div id="answerModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="answerTitle"></h2>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
