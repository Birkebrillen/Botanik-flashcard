<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Botanik Flashcards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-row">
        <h1>Botanik</h1>

        <div class="header-status">
          <span class="card-label" id="field-label"></span>
        </div>

        <div class="header-actions">
          <button id="filterToggleBtn" class="btn-ghost small header-filter" type="button" aria-haspopup="true" aria-expanded="false">
            Filter
          </button>

          <div id="filterPanel" class="filter-panel hidden" role="dialog" aria-label="Filtre">
            <div class="filter-panel-inner">
              <div class="filters">

                <!-- Spiltype -->
                <div class="filter-group">
                  <label for="gameTypeFilter">Spiltype</label>
                  <select id="gameTypeFilter">
                    <option value="arter">Arter</option>
                    <option value="feltkendetegn">Feltkendetegn</option>
                    <option value="husk_feltkendetegn">Husk feltkendetegn</option>

                    <!-- NYE: 20-pulje varianter -->
                    <option value="arter_20">20 arter (Arter)</option>
                    <option value="feltkendetegn_20">20 arter (Feltkendetegn)</option>
                    <option value="husk_feltkendetegn_20">20 arter (Husk feltkendetegn)</option>
                  </select>
                </div>

                <!-- NY: Checkbox-liste -->
                <div class="filter-group">
                  <label>Habitattype (vælg flere)</label>
                  <div id="habitattypeFilter" class="checkbox-list" aria-label="Habitattype filtre"></div>
                </div>

                <!-- NY: Checkbox-liste -->
                <div class="filter-group">
                  <label>Familie (vælg flere)</label>
                  <div id="familieFilter" class="checkbox-list" aria-label="Familie filtre"></div>
                </div>

                <button id="clearFiltersBtn" class="btn-ghost small" type="button">Nulstil</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div id="card" class="card">
        <div id="scoreBadge" class="score-badge score-neutral">0/0</div>

        <div class="card-content" id="field-content">
          <p>Swipe op (eller klik på kortet) for at starte.</p>
        </div>
      </div>
    </main>

    <!-- Svar-overlay -->
    <div id="answerModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="answerTitle"></h2>
        <p id="answerFamily" class="answer-family hidden"></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
