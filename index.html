<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Botanik Flashcards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.updated.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-row">
        <h1>Botanik-træner</h1>
        <button id="filterToggleBtn" class="btn-ghost small header-filter">Filter</button>
      </div>
      <p>Træn plantearter med flashcards</p>
    </header>


    <main class="app-main">
      <div id="card" class="card">
        <div class="card-header">
          <div class="card-label" id="field-label"></div>
          <div class="family-badge" id="familyBadge"></div>
        </div>
        <div class="card-content" id="field-content">
          <p>Swipe op (eller klik på kortet) for at starte.</p>
        </div>
      </div>
    </main>

    <div id="filterPanel" class="filter-panel hidden">
      <div class="filter-panel-inner">
        <div class="filters">
          <div class="filter-group">
            <label for="habitattypeFilter">Habitattype</label>
            <select id="habitattypeFilter">
              <option value="">Alle</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="familieFilter">Familie</label>
            <select id="familieFilter">
              <option value="">Alle</option>
            </select>
          </div>
          <button id="clearFiltersBtn" class="btn-ghost small">Nulstil</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Svar-overlay -->
  <div id="answerModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="answerTitle"></h2>
    </div>
  </div>

  <script src="app.updated.js"></script>
</body>
</html>
